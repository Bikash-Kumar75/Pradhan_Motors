<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradhan_Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">PRADHAN MOTORS</div>
    <div class="container">
        <h2>Product Entry</h2>
        <form name="submit-to-google-sheet">
            <div class="input-group">
                <label for="date">Date:</label>
                <input type="date" name="Date" id="date" required>
            </div>
            <div class="input-group">
                <label for="product">Product Name:</label>
                <input type="text" name="Product Name" id="product" required>
            </div>
            <div class="input-group">
                <label for="quantity">Quantity:</label>
                <input type="number" name="Quantity" id="quantity" required>
            </div>
            <div class="input-group">
                <label for="price">Total Price:</label>
                <input type="number" name="Total Price" id="price" required>
            </div>
            <div class="input-group">
                <label for="credit">Credit:</label>
                <input type="number" name="Credit" id="credit">
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
    <span id="msg"></span>
    <script src="script.js"></script>
</body>
</html>
